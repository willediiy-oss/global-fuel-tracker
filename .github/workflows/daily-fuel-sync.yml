name: Daily Fuel Price Sync

# Runs automatically every midnight (UTC) and can also be triggered manually
# from the Actions tab in GitHub for ad-hoc syncs or debugging.
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  sync-fuel-prices:
    name: Fetch & upsert fuel prices
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install axios @supabase/supabase-js ws

      - name: Run fuel price sync script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FUEL_API_KEY: ${{ secrets.FUEL_API_KEY }}
          FUEL_API_URL: ${{ vars.FUEL_API_URL }}
          SUPABASE_TABLE: ${{ vars.SUPABASE_TABLE }}
        run: node scripts/fetch-fuel-prices.js
